[tool.black]
line-length = 80
target-version = ["py311"]
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | common_layers
  | env
  | node_modules
  | tests
)/
'''
[tool.isort]
profile = "black"
multi_line_output = 3
[tool.bandit]
exclude_dirs = [
    ".git",
    ".hg",
    ".mypy_cache",
    ".tox",
    ".venv",
    "_build",
    "buck-out",
    "build",
    "dist",
    "common_layers",
    "env",
    "tests",
    "exemples",
    "node_modules",
    "docs",
]
